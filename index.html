<!doctype html>

  <body>
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>
    <div class="seuk-progress" aria-hidden="true"></div>
    <header class="site-header">
      <a class="site-logo" href="./">SEUK<span class="logo-dot">.</span></a>

        <a href="members/">멤버</a>

        <a href="https://github.com/Team-Seuk" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </header>
    <main id="main">
      <!-- 히어로 -->
      <section class="hero" aria-labelledby="hero-title">
        <div class="container hero-inner">
          <div class="hero-enter">
            <h1 class="hero-title seuk-skew" id="hero-title">
              <span class="hero-word"><span class="hero-ghosts" aria-hidden="true"><span>슥</span><span>슥</span><span>슥</span></span><span class="hero-accent">슥,</span></span>
              만듭니다.
            </h1>
          </div>
          <p class="hero-sub hero-enter hero-enter--sub">아이디어에서 데모까지 — 5인 해커톤 팀, Team-Seuk.</p>
        </div>
        <div class="container hero-scroll" aria-hidden="true">
          <svg class="scroll-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v11m0 0 4-4m-4 4-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>스크롤</span>
        </div>
      </section>

      <!-- 프로젝트 쇼케이스 -->
      <section id="projects" class="showcase" aria-label="프로젝트">
        <a class="case case--yaksok" href="projects/yaksok/">
          <div class="container case-grid">
            <div class="case-copy">
              <h2 class="case-name seuk-reveal">Yaksok<span class="case-arrow" aria-hidden="true"><svg viewBox="0 0 20 20" fill="none"><path d="M3 10h13m0 0-5-5m5 5-5 5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" /></svg></span></h2>
              <p class="case-desc seuk-reveal" data-seuk-delay="1">알약을 비추면, 복약 안내가 나온다.</p>
              <p class="case-tag seuk-reveal" data-seuk-delay="2">헬스케어 · FastAPI · React 19 · LLM</p>
            </div>
            <div class="case-media seuk-reveal" data-seuk-delay="2" aria-hidden="true">
              <div class="case-motif">
                <svg viewBox="0 0 360 440" fill="none" focusable="false">
                  <!-- 잔상 속도선 -->
                  <g stroke="var(--accent-line)" stroke-width="4" stroke-linecap="round">
                    <line x1="16" y1="120" x2="64" y2="120" />
                    <line x1="4" y1="152" x2="70" y2="152" opacity="0.6" />
                    <line x1="24" y1="184" x2="58" y2="184" opacity="0.35" />
                  </g>
                  <!-- 폰 프레임 -->
                  <rect x="92" y="20" width="184" height="400" rx="36" fill="var(--bg)" stroke="var(--text)" stroke-width="3" />
                  <rect x="158" y="40" width="52" height="6" rx="3" fill="var(--border-strong)" />
                  <!-- 카메라 뷰 -->
                  <rect x="108" y="62" width="152" height="230" rx="16" fill="var(--bg-elev-2)" />
                  <!-- 스캔 브래킷 -->
                  <g stroke="var(--accent)" stroke-width="4" stroke-linecap="round">
                    <path d="M128 100 v-14 a6 6 0 0 1 6 -6 h14" />
                    <path d="M220 80 h14 a6 6 0 0 1 6 6 v14" />
                    <path d="M240 254 v14 a6 6 0 0 1 -6 6 h-14" />
                    <path d="M148 274 h-14 a6 6 0 0 1 -6 -6 v-14" />
                  </g>
                  <!-- 알약 캡슐 -->
                  <g transform="rotate(-22 184 177)">
                    <rect x="138" y="157" width="92" height="40" rx="20" fill="var(--bg)" stroke="var(--text)" stroke-width="3" />
                    <path d="M184 157 h-26 a20 20 0 0 0 0 40 h26 z" fill="var(--accent)" />
                    <line x1="184" y1="157" x2="184" y2="197" stroke="var(--text)" stroke-width="3" />
                  </g>
                  <!-- 스캔 라인 -->
                  <line x1="116" y1="216" x2="252" y2="216" stroke="var(--accent)" stroke-width="2" stroke-dasharray="6 6" opacity="0.7" />
                  <!-- 복약 안내 카드 -->
                  <rect x="108" y="306" width="152" height="96" rx="14" fill="var(--accent-soft)" />
                  <rect x="122" y="322" width="72" height="10" rx="5" fill="var(--accent)" />
                  <rect x="122" y="344" width="124" height="7" rx="3.5" fill="var(--border-strong)" />
                  <rect x="122" y="360" width="104" height="7" rx="3.5" fill="var(--border-strong)" />
                  <rect x="122" y="376" width="116" height="7" rx="3.5" fill="var(--border-strong)" />
                </svg>
              </div>
            </div>
          </div>
        </a>
        <a class="case case--stock" href="projects/stock-ai/">
          <div class="container case-grid">
            <div class="case-copy">
              <h2 class="case-name seuk-reveal"><span class="case-name-text">재고관리 AI</span><span class="case-sub-label">(가제)</span><span class="case-arrow" aria-hidden="true"><svg viewBox="0 0 20 20" fill="none"><path d="M3 10h13m0 0-5-5m5 5-5 5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" /></svg></span></h2>
              <p class="case-desc seuk-reveal" data-seuk-delay="1">재고, 발주 관리를 10배의 속도로</p>
              <p class="case-tag seuk-reveal" data-seuk-delay="2">리테일 · 비전 AI · 재고 예측</p>
            </div>
            <div class="case-media seuk-reveal" data-seuk-delay="2" aria-hidden="true">
              <div class="case-motif">
                <svg viewBox="0 0 360 440" fill="none" focusable="false">
                  <!-- 잔상 속도선 -->
                  <g stroke="var(--bg)" stroke-width="4" stroke-linecap="round" opacity="0.5">
                    <line x1="10" y1="120" x2="52" y2="120" />
                    <line x1="0" y1="152" x2="58" y2="152" opacity="0.7" />
                    <line x1="18" y1="184" x2="46" y2="184" opacity="0.45" />
                  </g>
                  <!-- 매대 프레임 -->
                  <rect x="76" y="48" width="236" height="336" rx="12" stroke="var(--bg)" stroke-width="3" />
                  <line x1="76" y1="160" x2="312" y2="160" stroke="var(--bg)" stroke-width="3" />
                  <line x1="76" y1="272" x2="312" y2="272" stroke="var(--bg)" stroke-width="3" />
                  <!-- 상품 1단 -->
                  <g fill="var(--bg)">
                    <rect x="96" y="88" width="44" height="72" rx="6" opacity="0.9" />
                    <rect x="152" y="88" width="44" height="72" rx="6" opacity="0.55" />
                    <rect x="208" y="88" width="44" height="72" rx="6" opacity="0.9" />
                    <rect x="264" y="88" width="28" height="72" rx="6" opacity="0.3" />
                  </g>
                  <!-- 상품 2단 + 빈 슬롯 스캔 -->
                  <g fill="var(--bg)">
                    <rect x="96" y="208" width="44" height="64" rx="6" opacity="0.9" />
                    <rect x="152" y="208" width="44" height="64" rx="6" opacity="0.55" />
                  </g>
                  <rect x="208" y="208" width="44" height="64" rx="6" stroke="var(--bg)" stroke-width="2.5" stroke-dasharray="7 7" opacity="0.8" />
                  <g stroke="var(--bg)" stroke-width="4" stroke-linecap="round">
                    <path d="M196 224 v-20 a8 8 0 0 1 8 -8 h16" />
                    <path d="M240 196 h16 a8 8 0 0 1 8 8 v20" />
                    <path d="M264 256 v20 a8 8 0 0 1 -8 8 h-16" />

                    <rect x="160" y="320" width="52" height="44" rx="8" opacity="0.7" />
                    <rect x="224" y="320" width="52" height="44" rx="8" opacity="0.4" />
                  </g>
                  <!-- 재고 알림 배지 -->
                  <circle cx="312" cy="48" r="26" fill="var(--bg)" />
                  <rect x="308" y="34" width="8" height="18" rx="4" fill="var(--accent)" />
                  <circle cx="312" cy="61" r="4.5" fill="var(--accent)" />
                </svg>
              </div>
            </div>
          </div>
        </a>

      <!-- 팀 티저 -->

            멤버 보기
